<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120">
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Icône 0.36×200 = 72px ; (600−368)/2 ≈ 116 -->
  <g transform="translate(116, 0)">
    <g transform="translate(10, 24)">
      <g transform="scale(0.36)">
        <rect width="200" height="200" rx="32" fill="#0A1628"></rect>
        <rect x="22" y="28" width="156" height="56" rx="13" fill="#2563EB"></rect>
        <rect x="32" y="38" width="64" height="9" rx="4" fill="white" opacity="0.28"></rect>
        <rect x="32" y="53" width="40" height="7" rx="3" fill="white" opacity="0.14"></rect>
        <rect x="22" y="94" width="46" height="38" rx="10" fill="#3B82F6" opacity="0.92"></rect>
        <rect x="77" y="94" width="46" height="38" rx="10" fill="#6366F1" opacity="0.9"></rect>
        <rect x="132" y="94" width="46" height="38" rx="10" fill="#0EA5E9" opacity="0.92"></rect>
        <rect x="22" y="142" width="72" height="28" rx="9" fill="white" opacity="0.1"></rect>
        <rect x="104" y="142" width="74" height="28" rx="9" fill="white" opacity="0.06"></rect>
      </g>
    </g>

    <text x="98" y="60" dominant-baseline="middle"
          style="font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
                 font-size: 46px;
                 font-weight: 800;
                 letter-spacing: -2px;">
      <tspan fill="url(#purpleGradient)">aTV</tspan>
      <tspan fill="#1A1A1A"> Launcher</tspan>
    </text>
  </g>
</svg>
